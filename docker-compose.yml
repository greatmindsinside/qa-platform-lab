# One-command demo stack: API + web (nginx proxies /api → api:3333)
services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - '3333:3333'
    volumes:
      - quest-deck-data:/app/apps/api/data
    environment:
      HOST: 0.0.0.0
      PORT: 3333
      JWT_SECRET: docker-demo-secret

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - '8080:80'
    depends_on:
      - api

volumes:
  quest-deck-data:
