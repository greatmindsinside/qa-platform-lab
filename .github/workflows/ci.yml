name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @lab/shared build
      - run: yarn workspace @lab/testkit build
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test:unit
      - run: npx playwright install --with-deps chromium
      - run: yarn test:smoke
        env:
          CI: true

  main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: yarn
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn workspace @lab/shared build
      - run: yarn workspace @lab/testkit build
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn test:unit
      - run: npx playwright install --with-deps chromium
      - run: yarn test:all
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
