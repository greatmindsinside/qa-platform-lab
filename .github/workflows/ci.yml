name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Spec Kit + how-to docs
        run: |
          set -euo pipefail
          test -f README.md
          test -f .specify/memory/constitution.md
          test -f specs/001-quest-deck/spec.md
          test -f specs/001-quest-deck/plan.md
          test -f specs/001-quest-deck/tasks.md
          test -f docs/README.md
          test -f docs/spec-driven-development.md
          test -f docs/using-quest-deck.md
          echo "Docs check passed."

      # When the week-1 MVP lands (apps/, tests/, package.json), replace this job
      # with the PR smoke / main full gates from specs/001-quest-deck/tasks.md (T022+)
      - name: Placeholder for MVP test gates
        run: echo "No app packages yet — MVP CI gates deferred until Spec Kit tasks T001+."
