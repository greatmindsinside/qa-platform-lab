name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify portfolio docs
        run: |
          set -euo pipefail
          test -f README.md
          test -f docs/superpowers/specs/2026-07-19-qa-platform-lab-portfolio-design.md
          test -f docs/superpowers/plans/2026-07-19-qa-platform-lab.md
          echo "Docs check passed."

      # When the week-1 MVP lands (apps/, tests/, package.json), replace this job
      # with the PR smoke / main full gates from docs/superpowers/plans/2026-07-19-qa-platform-lab.md
      - name: Placeholder for MVP test gates
        run: echo "No app packages yet — MVP CI gates deferred until Task 1+ of the implementation plan."
